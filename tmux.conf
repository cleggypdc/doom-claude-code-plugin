# Optimized tmux config for doom-ascii streaming performance
set -g default-terminal "xterm-256color"

# 24-bit colour passthrough
set -as terminal-features ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-256color:Tc"

# Synchronized output — buffers frames and renders atomically (no flicker)
set -as terminal-features ",xterm-256color:Sync"

# Zero escape delay — eliminates input lag
set -sg escape-time 0

# Allow passthrough of escape sequences
set -g allow-passthrough on

# Increase history and scrollback buffer
set -g history-limit 1000

# Faster refresh
set -g status off
